apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k8s-example-vault
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://helm.releases.hashicorp.com
      chart: vault
      targetRevision: 0.34.0
      helm:
        valueFiles:
        - $values/vault/values.yaml
    - repoURL: 'https://github.com/MaciejWojs/k8s-example-iac.git'
      targetRevision: HEAD
      path: vault
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: vault
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    retry:
      refresh: true
    automated:
      enabled: true
      prune: true
      selfHeal: true