apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k8s-example-vault
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://helm.releases.hashicorp.com
    chart: vault
    targetRevision: 0.34.0
    helm:
      valueFiles:
      - $values/vault/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: vault
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    retry:
      refresh: true
    automated:
      enabled: true
      prune: true
      selfHeal: true