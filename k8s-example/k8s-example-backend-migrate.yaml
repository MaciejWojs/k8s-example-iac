apiVersion: batch/v1
kind: Job
metadata:
  name: atlas-migrate
  namespace: k8s-example
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: atlas
          image: ghcr.io/maciejwojs/k8s-example-backend:0.0.8
          command: ["atlas"]
          args:
            - migrate
            - apply
            - --env
            - local
            - --url
            - $(DATABASE_URL)
          env:
          - name: DATABASE_URL
            valueFrom:
              secretKeyRef:
                name: backend-secret
                key: DATABASE_URL